name: CI/CD Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Unit Tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 -m unittest discover tests

      - name: Start Orchestrator (Background)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 -c "from src.orchestrator import Orchestrator; Orchestrator().start()" &
          echo "Orchestrator online and listening..."
          sleep 5 

      - name: Run Ingestion (Publisher)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 scripts/ingest_data.py

      - name: Verify Final Pipeline Results (With Polling)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "Waiting for Orchestrator to process at least 10 images..."
          for i in {1..10}; do
            COUNT=$(python3 -c "from src.document_store import DocumentStore; print(len(DocumentStore().client.keys('image_doc:*')))")
            V_COUNT=$(python3 -c "from src.vector_db import VectorDB; print(VectorDB().index.ntotal)")
            
            echo "Current Progress -> Docs: $COUNT, Vectors: $V_COUNT"
            
            if [ "$COUNT" -ge 10 ] && [ "$V_COUNT" -ge 10 ]; then
              echo "Success: $COUNT documents and $V_COUNT vectors verified!"
              exit 0
            fi
            sleep 5
          done

          echo "Error: Pipeline failed to synchronize 10 records within the time limit."
          exit 1
