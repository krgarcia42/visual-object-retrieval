name: CI/CD Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FAISS Unit Tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 -m unittest tests/test_faiss.py

      - name: Start Orchestrator (Background)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 -c "from src.orchestrator import Orchestrator; Orchestrator().start()" &
          echo "Orchestrator started in background..."
          sleep 5 

      - name: Run Ingestion (Publisher)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 scripts/ingest_data.py

      - name: Verify Results (Document & Vector Check)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python3 -c "from src.document_store import DocumentStore; print(f'Mongo-style Docs found: {len(DocumentStore().client.keys(\"image_doc:*\"))}')"
          python3 -c "from src.vector_db import VectorDB; vdb = VectorDB(); print(f'FAISS Index Count: {vdb.index.ntotal}')"
