name: CI/CD Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Unit Tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Runs test_faiss.py and test_system.py (validation, idempotency, etc.)
          python3 -m unittest discover tests

      - name: Start Orchestrator (Background)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Starts the subscriber loop in the background
          python3 -c "from src.orchestrator import Orchestrator; Orchestrator().start()" &
          echo "Orchestrator online and listening..."
          sleep 5 

      - name: Run Ingestion (Publisher)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Publishes the 10-image dataset to Redis channel
          python3 scripts/ingest_data.py

      - name: Verify Final Pipeline Results (With Polling)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "Waiting for Orchestrator to process 10 images..."
          # Polling loop: Checks every 5s for up to 30s total
          for i in {1..6}; do
            COUNT=$(python3 -c "from src.document_store import DocumentStore; print(len(DocumentStore().client.keys('image_doc:*')))")
            echo "Current Document Count: $COUNT/10"
            if [ "$COUNT" -eq 10 ]; then
              echo "Success: All 10 images processed and stored in NoSQL DB!"
              
              echo "--- EMBEDDING DB CHECK ---"
              python3 -c "from src.vector_db import VectorDB; vdb = VectorDB(); print(f'FAISS Vectors Indexed: {vdb.index.ntotal}')"
              exit 0
            fi
            sleep 5
          done

          echo "Error: Orchestrator failed to process all images within the time limit."
          exit 1
