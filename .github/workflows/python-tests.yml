name: CI/CD Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Unit Tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # This runs test_faiss.py AND test_system.py (idempotency, validation, etc.)
          python3 -m unittest discover tests

      - name: Start Orchestrator (Background)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Starts the subscriber loop in the background
          python3 -c "from src.orchestrator import Orchestrator; Orchestrator().start()" &
          echo "Orchestrator online and listening..."
          sleep 5 

      - name: Run Ingestion (Publisher)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Publishes the 10-image dataset to Redis
          python3 scripts/ingest_data.py

      - name: Verify Final Pipeline Results
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          echo "--- DOCUMENT DB CHECK ---"
          python3 -c "from src.document_store import DocumentStore; print(f'Total NoSQL Documents Found: {len(DocumentStore().client.keys(\"image_doc:*\"))}')"
          
          echo "--- EMBEDDING DB CHECK ---"
          python3 -c "from src.vector_db import VectorDB; vdb = VectorDB(); print(f'FAISS Vectors Indexed: {vdb.index.ntotal}')"

      - name: Integration Test (End-to-End)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          # Specific check to ensure Orchestrator processed the ingestion
          python3 -c "from src.document_store import DocumentStore; count = len(DocumentStore().client.keys(\"image_doc:*\")); exit(0 if count == 10 else 1)"
