name: CI/CD Pipeline

on: [push]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step 1 - Run Unit Tests
        env:
          REDIS_HOST: localhost
          PYTHONPATH: .
        run: |
          python3 tests/test_faiss.py
          python3 tests/test_system.py

      - name: Step 2 - Start Orchestrator & Run Integration
        env:
          REDIS_HOST: localhost
          PYTHONPATH: .
        run: |
          python3 -c "from src.orchestrator import Orchestrator; Orchestrator().start()" &
          echo "Orchestrator background process spawned."
          sleep 5
          
          python3 scripts/ingest_data.py
          python3 tests/test_final.py

      - name: Step 3 - Final Audit
        env:
          REDIS_HOST: localhost
          PYTHONPATH: .
        run: |
          DOC_COUNT=$(python3 -c "from src.document_store import DocumentStore; print(len(DocumentStore().client.keys('image_doc:*')))")
          VEC_COUNT=$(python3 -c "from src.vector_db import VectorDB; vdb = VectorDB(); print(vdb.index.ntotal)")
          echo "Final Audit Results -> Docs: $DOC_COUNT, Vectors: $VEC_COUNT"
          
          if [ "$DOC_COUNT" -lt 10 ]; then 
            echo "Failure: Expected at least 10 documents."
            exit 1
          fi
