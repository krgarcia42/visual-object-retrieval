name: Python Unit Tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install redis
        # I'm not adding a requirements.txt yet, just installing redis manually
        # This is a bit "amateur" which fits our goal.

    - name: Run tests
      run: |
        python -m unittest discover tests
